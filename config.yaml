# Конфиг бота. Правь свободно — код перечитывает файл при запуске.
# Секреты (токены) лежат отдельно в .env, не здесь.

# Как часто опрашивать источники (секунды). 300 = каждые 5 минут.
poll_interval_sec: 300

# Какие источники включены. Закомментируй ненужные.
# Доступны: telegram_channels, freelance_ru, kadrof, hh, kwork, weblancer, profi, yandex_uslugi
# (Habr Freelance закрыт окончательно — сервиса больше нет, заменён на freelance.ru + kadrof.)
enabled_sources:
  - telegram_channels
  - freelance_ru
  - kadrof
  - hh
  - kwork
  - weblancer

sources:
  hh:
    # Поисковые запросы к hh.ru (по каждому делается отдельный запрос).
    queries:
      - "разработка сайта"
      - "верстка сайта"
      - "лендинг"
      - "frontend разработчик"
      - "telegram бот разработка"
      - "python разработчик автоматизация"
    area: 113          # 113 = Россия (см. https://api.hh.ru/areas)
    period_days: 1     # только вакансии за последние N дней
    per_page: 50
    search_field: name # где искать: name | description | company_name

  telegram_channels:
    # Юзернеймы ПУБЛИЧНЫХ каналов без @ (читаются через t.me/s/<канал>).
    # Все ниже проверены: публичные и отдают посты. Фильтр по заголовку
    # (match.require_keyword_in_title) отсекает нерелевантное из общих каналов.
    channels:
      # фриланс / удалёнка (бывают заказы на сайты/боты)
      - freelancetaverna     # Фриланс Таверна
      - freelance_vacancies  # Фриланс чат | вакансии
      - naudalenkebro        # Удалёнка 2.0 / Finder.work
      - theyseeku            # Охотник за головами / Finder.work
      - workathomerus        # WorkAtHome (в т.ч. программисты)
      # IT / разработка
      - Getitrussia          # Get IT — вакансии разработчиков
      - ru_pythonjobs        # Python Jobs
      - jvmjobs              # pro.JVM Jobs (Java)
      - over100              # Работа в Digital от 100к
    limit_per_channel: 20

  # freelance.ru — живая биржа, парсится статикой (страница /task).
  freelance_ru:
    url: "https://freelance.ru/task"
    include_premium: false   # true — показывать и премиум-заказы (отклик требует подписки)

  # kadrof.ru — лента заказов/вакансий, статический HTML, обновляется ежедневно.
  kadrof:
    url: "https://www.kadrof.ru/work"

  # HTML-биржи (грузят список через JS → нужен Playwright, см. requirements.txt).
  kwork:
    url: "https://kwork.ru/projects"
  weblancer:
    url: "https://www.weblancer.net/jobs/"

  # --- Фаза 3, best-effort через Playwright (нужен headless-браузер) ---
  profi: {}
  yandex_uslugi: {}

# Подбор заказов (скоринг по ключевым словам).
match:
  min_score: 2.0      # порог: заказ проходит при score >= этого значения
  include_weight: 1.0 # вес обычного совпадения
  boost_weight: 2.0   # вес "веб-разработческого" совпадения (приоритет)
  # true — ключевое слово должно быть в ЗАГОЛОВКЕ заказа (резко повышает точность:
  # отсекает посты, где "сайт/api" упомянуты вскользь). false — искать по всему тексту.
  require_keyword_in_title: true

  # Заказ должен содержать хотя бы одно из этих слов, иначе отбрасывается.
  # Это то, что мы реально делаем: сайты, веб-приложения, Telegram-боты,
  # парсеры, скрипты, автоматизация, интеграции по API.
  # Слова даны "основами": "сайт" ловит сайта/сайте/сайтов, "верстк" — верстка/вёрстку.
  include_keywords:
    # --- веб (приоритет) ---
    - сайт
    - website
    - веб-сайт
    - веб-приложен
    - веб-разработ
    - лендинг
    - лэндинг
    - landing
    - верстк
    - вёрстк
    - интернет-магазин
    - интернет магазин
    - frontend
    - фронтенд
    - backend
    - бэкенд
    - fullstack
    - фулстек
    - tilda
    - тильда
    - wordpress
    - вордпресс
    - bitrix
    - битрикс
    # --- языки и фреймворки (заголовки вида "Python/React разработчик") ---
    - python
    - питон
    - react
    - реакт
    - vue
    - angular
    - svelte
    - django
    - fastapi
    - flask
    - node
    - laravel
    - php
    - javascript
    - typescript
    # --- боты ---
    - бот
    - бота
    - ботов
    - телеграм-бот
    - телеграм бот
    - телеграмм бот
    - telegram бот
    - чат-бот
    - чатбот
    - aiogram
    - discord
    - дискорд
    # --- парсинг / автоматизация / скрипты ---
    - парсер
    - парсинг
    - спарсить
    - скрейп
    - scraping
    - scrapy
    - автоматизац
    - автоматизир
    - скрипт
    - selenium
    - playwright
    - api
    - интегр

  # Повышенный вес (приоритет того, что нам выгоднее брать).
  boost_keywords:
    - сайт
    - лендинг
    - landing
    - верстка
    - вёрстка
    - wordpress
    - tilda
    - тильда
    - bitrix
    - битрикс
    - react
    - vue
    - next
    - angular
    - html
    - css
    - интернет-магазин
    - веб-приложение
    - адаптив
    - figma
    - бот
    - телеграм-бот
    - telegram бот
    - aiogram
    - парсер
    - парсинг
    - автоматизац
    - python

  # Если встретилось — заказ режем (нерелевантное / не веб-разработка).
  exclude_keywords:
    - логотип
    - дизайн интерьера
    - копирайтинг
    - реферат
    - курсовая
    - 1с бухгалтерия
    - ремонт квартир
    - грузчик
    - клининг
    # полиграфия / графдизайн / печать ("верстка" там не про веб)
    - indesign
    - индизайн
    - illustrator
    - иллюстратор
    - типографи
    - полиграфи
    - допечат
    - воркбук
    - буклет
    - листовк
    - визитк для печати
    # микрозадачи / спам (часто на биржах, это не разработка)
    - регистрация на сайт
    - написание отзыв
    - оставить отзыв
    - разместить отзыв
    - размещение отзыв
    - накрутк
    - рассылк сообщени
    - размещение объявлен
    - оператор чат
    - наставничеств
    - монтаж reels
    - монтаж видео

# Шаблоны откликов: общие куски берутся отсюда, опыт — по категориям.
# Полное резюме (для отправки работодателям) — в файле РЕЗЮМЕ.md.
responder:
  greeting: "Здравствуйте!"
  # ЗАМЕНИ на ссылку своего портфолио (соберём вместе позже).
  portfolio_link: "https://example.com/portfolio"
  cta: "Готов обсудить детали и сориентировать по срокам. Когда удобно созвониться или списаться?"
  experience:
    landing: "Делаю адаптивные лендинги и сайты под ключ: вёрстка (HTML/CSS/JS), Tilda и WordPress, подключение форм, оплаты и аналитики. Чистый код, кросс-браузерность, мобильная версия."
    ecommerce: "Запускаю интернет-магазины: каталог, корзина, оформление и оплата заказа, интеграции с CRM, доставкой и платёжками. Работаю с WordPress/WooCommerce, Bitrix и кастомными решениями."
    fix: "Берусь за доработки и правки существующих сайтов: быстро разбираюсь в чужом коде, чиню баги, добавляю функционал, ускоряю загрузку, правлю вёрстку и адаптив."
    webapp: "Разрабатываю веб-приложения, личные кабинеты и сервисы: фронтенд (React/Vue) + бэкенд (Python: FastAPI/Django, Node.js), REST API, авторизация, база данных, деплой."
    bot: "Пишу Telegram-ботов на Python (aiogram): команды и меню, оплаты, рассылки, работа с базой, интеграции по API, админ-панель. Также чат-боты и Discord-боты. Разворачиваю на сервере под ключ."
    automation: "Автоматизирую рутину и пишу парсеры на Python (requests/httpx, BeautifulSoup, Selenium, Playwright, Scrapy): сбор данных с сайтов, выгрузки в Excel/Google Sheets, интеграции сервисов по API, скрипты по ТЗ."
    generic: "Занимаюсь разработкой: сайты и лендинги, веб-приложения, Telegram-боты, парсеры и автоматизация на Python. Аккуратно отношусь к ТЗ и срокам, на связи по ходу работы."
