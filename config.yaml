# Конфиг бота. Правь свободно — код перечитывает файл при запуске.
# Секреты (токены) лежат отдельно в .env, не здесь.

# Как часто опрашивать источники при локальном запуске без --once (секунды).
poll_interval_sec: 300

# Интервал для ТЕКСТА сообщений бота ("проверяю раз в N минут").
# Это только для подписи — реальное расписание в облаке задаётся cron в
# .github/workflows/freelance-bot.yml. Держи их согласованными (сейчас 15 мин).
update_interval_minutes: 15

# Heartbeat: если новых заказов нет, бот раз в heartbeat_interval_minutes
# пишет ВЛАДЕЛЬЦУ "новых заказов нет, работаю" (чтобы видеть, что бот жив).
# Друзьям не шлётся. heartbeat_idle: false — выключить.
heartbeat_idle: true
heartbeat_interval_minutes: 60

# Многопользовательский режим: бот обрабатывает /start и ключ доступа,
# и рассылает заказы всем подписчикам. Ключ задаётся в .env -> ACCESS_KEY.
# false — бот шлёт заказы только владельцу (TELEGRAM_CHAT_ID).
multi_user: true

# Какие источники включены. Закомментируй ненужные.
# Доступно: telegram_channels, freelance_ru, kadrof, kwork, weblancer, fl_ru, youdo,
#           freelancehunt, upwork, freelancer_com, profi, yandex_uslugi, hh
# hh выключен намеренно — там вакансии на ПОСТОЯННУЮ работу, а нам нужны разовые заказы.
# weblancer/fl_ru/youdo — блокируют датацентровые IP (GitHub Actions), работают только локально с RU-IP.
enabled_sources:
  - telegram_channels
  - freelance_ru
  - kadrof
  - freelancehunt      # статический HTML, стабильно в облаке
  - upwork             # RSS без авторизации
  - remoteok           # JSON API без авторизации — самый надёжный зарубежный
  - weworkremotely     # RSS-лента programming+devops вакансий
  - guru               # HTML-листинг, умеренная защита
  - freelancer_com     # best-effort HTML, может блокироваться
  - peopleperhour      # best-effort HTML (UK биржа)
  - kwork
  - weblancer
  - fl_ru
  - youdo

sources:
  hh:
    # Поисковые запросы к hh.ru (по каждому делается отдельный запрос).
    queries:
      - "разработка сайта"
      - "верстка сайта"
      - "лендинг"
      - "frontend разработчик"
      - "telegram бот разработка"
      - "python разработчик автоматизация"
    area: 113          # 113 = Россия (см. https://api.hh.ru/areas)
    period_days: 1     # только вакансии за последние N дней
    per_page: 50
    search_field: name # где искать: name | description | company_name

  telegram_channels:
    # Юзернеймы ПУБЛИЧНЫХ каналов без @ (читаются через t.me/s/<канал>).
    # Фильтр по заголовку (match.require_keyword_in_title) отсекает нерелевантные посты.
    # exclude_keywords режет постоянную работу даже если она встречается в этих каналах.
    channels:
      - freelancetaverna     # Фриланс Таверна
      - freelance_vacancies  # Фриланс чат | вакансии
      - naudalenkebro        # На удалёнке 2.0 / Finder.work
      - theyseeku            # Охотник за головами / Finder.work
      - workathomerus        # WorkAtHome
      - jobs_code            # Jobs Code — IT-вакансии: программирование, боты, верстка
      - jobGeeks             # Job Geeks — разработчики, QA, DevOps
      - mobile_jobs          # Mobile Dev Jobs — мобильная разработка
      - csharp_job           # C#/.NET вакансии и проекты
      - GetIT_Russia         # GetIT Russia — крупное IT-сообщество (300к+)
      - finder_vc            # Finder.vc — удалёнка и фриланс (300к+ подписчиков)
      - distantsiya          # Дистанция — проверенные фриланс-проекты
      - ipomogator           # Помогатор — заказчики и исполнители, много проектных задач
    limit_per_channel: 20

  # freelance.ru — живая биржа, парсится статикой (страница /task).
  freelance_ru:
    url: "https://freelance.ru/task"
    include_premium: false   # true — показывать и премиум-заказы (отклик требует подписки)

  # kadrof.ru — лента заказов/вакансий, статический HTML, обновляется ежедневно.
  kadrof:
    url: "https://www.kadrof.ru/work"

  # HTML-биржи (грузят список через JS → нужен Playwright: pip install playwright
  # && python -m playwright install chromium). Без браузера вернут пусто.
  kwork:
    url: "https://kwork.ru/projects"
  weblancer:
    url: "https://www.weblancer.net/jobs/"

  # Биржи с тяжёлым анти-ботом — best-effort через Playwright. Надёжнее всего
  # работают локально с РОССИЙСКОГО IP; с заграничного (GitHub) часто блокируются.
  fl_ru:
    url: "https://www.fl.ru/projects/"
  youdo:
    url: "https://youdo.com/tasks-internet-it"

  # Freelancehunt — украинско-российская биржа, статический HTML, стабильно работает в облаке.
  freelancehunt:
    url: "https://freelancehunt.com/projects/"

  # Upwork — английские проекты через RSS. Список поисковых запросов ниже.
  upwork:
    queries:
      - "web developer"
      - "python developer"
      - "telegram bot"
      - "react developer"
      - "unity developer"
      - "web scraping python"
      - "automation script"
      - "website development"

  # Freelancer.com — best-effort HTML-парсинг. Может блокироваться датацентром.
  freelancer_com:
    url: "https://www.freelancer.com/jobs/"

  # RemoteOK — публичный JSON API, работает со всех IP без капчи.
  remoteok:
    limit: 50   # сколько вакансий брать за раз

  # We Work Remotely — RSS-ленты programming и devops.
  weworkremotely:
    feeds:
      - "https://weworkremotely.com/categories/remote-programming-jobs.rss"
      - "https://weworkremotely.com/categories/remote-devops-sysadmin-jobs.rss"

  # Guru.com — листинг проектов, умеренная защита.
  guru:
    url: "https://www.guru.com/d/jobs/"

  # PeoplePerHour — UK-биржа, best-effort HTML.
  peopleperhour:
    url: "https://www.peopleperhour.com/freelance-jobs"

  # Профи.ру / Яндекс Услуги — заказы под логином исполнителя (нужна сессия).
  profi: {}
  yandex_uslugi: {}

# Подбор заказов (скоринг по ключевым словам).
match:
  min_score: 2.0      # порог: заказ проходит при score >= этого значения
  include_weight: 1.0 # вес обычного совпадения
  boost_weight: 2.0   # вес "веб-разработческого" совпадения (приоритет)
  # true — ключевое слово должно быть в ЗАГОЛОВКЕ заказа (резко повышает точность:
  # отсекает посты, где "сайт/api" упомянуты вскользь). false — искать по всему тексту.
  require_keyword_in_title: true

  # Заказ должен содержать хотя бы одно из этих слов, иначе отбрасывается.
  # Это то, что мы реально делаем: сайты, веб-приложения, Telegram-боты,
  # парсеры, скрипты, автоматизация, интеграции по API.
  # Слова даны "основами": "сайт" ловит сайта/сайте/сайтов, "верстк" — верстка/вёрстку.
  include_keywords:
    # --- веб (приоритет) ---
    - сайт
    - website
    - веб-сайт
    - веб-приложен
    - веб-разработ
    - лендинг
    - лэндинг
    - landing
    - верстк
    - вёрстк
    - интернет-магазин
    - интернет магазин
    - frontend
    - фронтенд
    - backend
    - бэкенд
    - fullstack
    - фулстек
    - tilda
    - тильда
    - wordpress
    - вордпресс
    - bitrix
    - битрикс
    # --- языки и фреймворки (заголовки вида "Python/React разработчик") ---
    - python
    - питон
    - react
    - реакт
    - vue
    - angular
    - svelte
    - django
    - fastapi
    - flask
    - node
    - laravel
    - php
    - javascript
    - typescript
    # --- боты ---
    - бот
    - бота
    - ботов
    - телеграм-бот
    - телеграм бот
    - телеграмм бот
    - telegram бот
    - чат-бот
    - чатбот
    - aiogram
    - discord
    - дискорд
    # --- парсинг / автоматизация / скрипты ---
    - парсер
    - парсинг
    - спарсить
    - скрейп
    - scraping
    - scrapy
    - автоматизац
    - автоматизир
    - скрипт
    - selenium
    - playwright
    - api
    - интегр
    # --- геймдев / Unity (хочу видеть отдельно) ---
    - unity
    - юнити
    - unity3d
    - gamedev
    - геймдев
    - разработка игр
    - игровой движок
    # --- английские ключевые слова (для зарубежных бирж) ---
    - web developer
    - web development
    - website
    - landing page
    - ecommerce
    - e-commerce
    - telegram bot
    - discord bot
    - chatbot
    - scraping
    - crawler
    - automation
    - developer
    - programmer
    - full stack
    - fullstack
    - backend
    - frontend
    - mobile app
    - game developer
    - unity developer
    - c# developer

  # Повышенный вес (приоритет того, что нам выгоднее брать).
  boost_keywords:
    - сайт
    - лендинг
    - landing
    - верстка
    - вёрстка
    - wordpress
    - tilda
    - тильда
    - bitrix
    - битрикс
    - react
    - vue
    - next
    - angular
    - html
    - css
    - интернет-магазин
    - веб-приложение
    - адаптив
    - figma
    - бот
    - телеграм-бот
    - telegram бот
    - aiogram
    - парсер
    - парсинг
    - автоматизац
    - python
    - unity
    - юнити
    - gamedev

  # Если встретилось — заказ режем (нерелевантное / не веб-разработка).
  exclude_keywords:
    - логотип
    - дизайн интерьера
    - копирайтинг
    - реферат
    - курсовая
    - 1с бухгалтерия
    - ремонт квартир
    - грузчик
    - клининг
    # полиграфия / графдизайн / печать ("верстка" там не про веб)
    - indesign
    - индизайн
    - illustrator
    - иллюстратор
    - типографи
    - полиграфи
    - допечат
    - воркбук
    - буклет
    - листовк
    - визитк для печати
    # микрозадачи / спам (часто на биржах, это не разработка)
    - регистрация на сайт
    - написание отзыв
    - оставить отзыв
    - разместить отзыв
    - размещение отзыв
    - накрутк
    - рассылк сообщени
    - размещение объявлен
    - оператор чат
    - наставничеств
    - монтаж reels
    - монтаж видео
    # промо / инфобизнес (не заказы)
    - заработал +
    - пассивный доход
    - инфобизнес
    - мой кейс
    - как я заработал
    # ПОСТОЯННАЯ РАБОТА / штат — нам нужны РАЗОВЫЕ заказы, не трудоустройство
    - полный рабочий день
    - полная занятость
    - постоянная работа
    - постоянную работу
    - на постоянной основе
    - в штат
    - штатный сотрудник
    - оформление по тк
    - тк рф
    - трудоустройство
    - соцпакет
    - испытательный срок
    - график 5/2
    - 5/2
    - оклад
    - белая зарплата
    - выход в офис
    - работа в офисе
    - релокация
    - relocation
    - full-time
    - fulltime
    - фуллтайм
    - полная ставка

# Шаблоны откликов: общие куски берутся отсюда, опыт — по категориям.
# Полное резюме (для отправки работодателям) — в файле РЕЗЮМЕ.md.
responder:
  # Что класть в карточку: prompt — ГОТОВЫЙ ПРОМПТ для Gemini (копируешь → вставляешь
  # в Gemini → он пишет отклик под заказчика); text — сразу готовый отклик из шаблона.
  output: prompt
  greeting: "Здравствуйте!"
  # ЗАМЕНИ на ссылку своего портфолио (соберём вместе позже).
  portfolio_link: "https://example.com/portfolio"
  cta: "Готов обсудить детали и сориентировать по срокам. Когда удобно созвониться или списаться?"
  # Профиль для промпта Gemini — кто я и что умею (Gemini выберет релевантное).
  profile: >
    Разработчик полного цикла. Делаю сайты и лендинги (HTML/CSS/JS, Tilda, WordPress, Bitrix),
    интернет-магазины, веб-приложения (React/Vue + Python: FastAPI/Django, Node.js, REST API),
    Telegram-ботов на aiogram, парсеры и автоматизацию на Python (Selenium/Playwright/Scrapy),
    игры на Unity (C#). Чисто пишу код, держу сроки, на связи по ходу работы.
  experience:
    landing: "Делаю адаптивные лендинги и сайты под ключ: вёрстка (HTML/CSS/JS), Tilda и WordPress, подключение форм, оплаты и аналитики. Чистый код, кросс-браузерность, мобильная версия."
    ecommerce: "Запускаю интернет-магазины: каталог, корзина, оформление и оплата заказа, интеграции с CRM, доставкой и платёжками. Работаю с WordPress/WooCommerce, Bitrix и кастомными решениями."
    fix: "Берусь за доработки и правки существующих сайтов: быстро разбираюсь в чужом коде, чиню баги, добавляю функционал, ускоряю загрузку, правлю вёрстку и адаптив."
    webapp: "Разрабатываю веб-приложения, личные кабинеты и сервисы: фронтенд (React/Vue) + бэкенд (Python: FastAPI/Django, Node.js), REST API, авторизация, база данных, деплой."
    bot: "Пишу Telegram-ботов на Python (aiogram): команды и меню, оплаты, рассылки, работа с базой, интеграции по API, админ-панель. Также чат-боты и Discord-боты. Разворачиваю на сервере под ключ."
    automation: "Автоматизирую рутину и пишу парсеры на Python (requests/httpx, BeautifulSoup, Selenium, Playwright, Scrapy): сбор данных с сайтов, выгрузки в Excel/Google Sheets, интеграции сервисов по API, скрипты по ТЗ."
    gamedev: "Разрабатываю на Unity (C#): игровая логика, механики, UI, работа с физикой и сценами, оптимизация. Уверенно владею C# и движками, делаю как прототипы, так и доработку существующих проектов."
    generic: "Занимаюсь разработкой: сайты и лендинги, веб-приложения, Telegram-боты, парсеры и автоматизация на Python, игры на Unity (C#). Аккуратно отношусь к ТЗ и срокам, на связи по ходу работы."
