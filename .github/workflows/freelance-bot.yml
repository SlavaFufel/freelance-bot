name: freelance-bot

# GitHub плохо держит частые cron-расписания (*/15 массово задерживаются/пропускаются).
# Поэтому работаем "keep-alive циклом": один job крутится ~5.5 часа, прогоняя бота
# каждые 15 минут, затем перезапускает сам себя. Так бот работает почти непрерывно.
# Расписание раз в 3 часа оставлено как страховка на случай обрыва цепочки.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: [".github/workflows/freelance-bot.yml"]
  schedule:
    - cron: "0 */3 * * *"   # страховочный перезапуск (UTC)

permissions:
  actions: write    # нужно для самоперезапуска (gh workflow run)
  contents: read

concurrency:
  group: freelance-bot
  cancel-in-progress: false   # не убивать уже работающий цикл

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350       # ~5.8 ч, под лимитом GitHub в 6 ч
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install playwright

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright Chromium
        continue-on-error: true
        run: python -m playwright install --with-deps chromium

      - name: Restore dedup DB
        uses: actions/cache@v4
        with:
          path: freelance_bot.db
          key: freelance-db-${{ github.run_id }}
          restore-keys: |
            freelance-db-

      - name: Run loop (~5.5h, every 15 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HH_USER_AGENT: ${{ secrets.HH_USER_AGENT }}
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          ENABLED_SOURCES: "telegram_channels,freelance_ru,kadrof,kwork,weblancer"
        run: |
          END=$((SECONDS + 19800))   # 5.5 часа
          i=0
          while [ $SECONDS -lt $END ]; do
            i=$((i + 1))
            echo "::group::iteration $i"
            python run.py --once --log-level INFO || true
            echo "::endgroup::"
            [ $SECONDS -lt $END ] && sleep 900   # пауза 15 минут
          done

      - name: Keep alive (re-trigger self)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run freelance-bot.yml -R ${{ github.repository }} || true
