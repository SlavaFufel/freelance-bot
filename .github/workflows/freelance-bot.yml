name: freelance-bot

# GitHub плохо держит частые cron-расписания, поэтому работаем "keep-alive циклом":
# один job крутится ~50 минут (команды каждую минуту, заказы раз в 15 мин), сохраняет
# состояние в кэш и перезапускает сам себя. Короткий job = состояние фиксируется часто
# (меньше окно потери при сбое). schedule раз в 6ч — только страховка, если цепочка
# самоперезапуска оборвётся.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: [".github/workflows/freelance-bot.yml"]
  schedule:
    - cron: "0 */6 * * *"   # редкая страховка (UTC)

permissions:
  actions: write
  contents: read

concurrency:
  group: freelance-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 70        # цикл рассчитан на ~50 мин, запас до отмены
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install playwright

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright Chromium
        continue-on-error: true
        run: python -m playwright install --with-deps chromium

      # Состояние (offset getUpdates, подписчики, seen-заказы) живёт в SQLite и
      # переносится между job'ами через кэш. Restore и Save разнесены, чтобы Save
      # выполнялся даже при сбое шага цикла (if: always()).
      - name: Restore state DB
        uses: actions/cache/restore@v4
        with:
          path: freelance_bot.db
          key: freelance-db-${{ github.run_id }}
          restore-keys: |
            freelance-db-

      - name: Run loop (~50 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HH_USER_AGENT: ${{ secrets.HH_USER_AGENT }}
          ACCESS_KEY: ${{ secrets.ACCESS_KEY }}
          ENABLED_SOURCES: "telegram_channels,freelance_ru,kadrof,kwork,weblancer"
        run: |
          END=$((SECONDS + 3000))     # ~50 минут, потом self-restart
          NEXT_ORDERS=0               # когда в следующий раз искать заказы
          while [ $SECONDS -lt $END ]; do
            # команды (/start, ключ) — каждую минуту, чтобы отвечать почти мгновенно
            python run.py --commands --log-level WARNING || true
            # заказы — раз в 15 минут
            if [ $SECONDS -ge $NEXT_ORDERS ]; then
              echo "::group::fetch orders"
              python run.py --once --log-level INFO || true
              echo "::endgroup::"
              NEXT_ORDERS=$((SECONDS + 900))
            fi
            sleep 60
          done

      - name: Save state DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: freelance_bot.db
          key: freelance-db-${{ github.run_id }}

      - name: Keep alive (re-trigger self)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh workflow run freelance-bot.yml -R "${{ github.repository }}"; then
            echo "::warning::Не удалось перезапустить workflow — подхватит расписание (раз в 6ч)."
          fi
